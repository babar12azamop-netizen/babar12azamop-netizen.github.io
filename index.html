<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE KILLA</title>
    <style>
        body { background: #000; color: #fff; text-align: center; margin: 0; padding: 0; }
        canvas { border: 2px solid #00ff00; background: #222; display: block; margin: 20px auto; }
        .btn { padding: 20px; font-size: 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>SNAKE KILLA 🐍</h1>
    <canvas id="game" width="300" height="300"></canvas>
    <div>
        <button class="btn" onclick="dir='UP'">🔼</button><br>
        <button class="btn" onclick="dir='LEFT'">◀️</button>
        <button class="btn" onclick="dir='DOWN'">🔽</button>
        <button class="btn" onclick="dir='RIGHT'">▶️</button>
    </div>
    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        let s = [{x:10,y:10}], f = {x:15,y:15}, dir = "RIGHT";
        function loop() {
            let h = {x: s[0].x, y: s[0].y};
            if(dir=="UP") h.y--; if(dir=="DOWN") h.y++; if(dir=="LEFT") h.x--; if(dir=="RIGHT") h.x++;
            if(h.x==f.x && h.y==f.y) f={x:Math.floor(Math.random()*15),y:Math.floor(Math.random()*15)}; else s.pop();
            s.unshift(h);
            ctx.fillStyle="#222"; ctx.fillRect(0,0,300,300);
            ctx.fillStyle="red"; ctx.fillRect(f.x*20, f.y*20, 18, 18);
            ctx.fillStyle="lime"; s.forEach(p => ctx.fillRect(p.x*20, p.y*20, 18, 18));
            setTimeout(loop, 150);
        }
        loop();
    </script>
</body>
</html>
